    <!--
      ============================================
      💳 Razorpay Checkout Script
      ============================================
      Yeh Razorpay ka official JavaScript library hai.
      Isko <head> mein load karna zaroori hai kyunki:
      - window.Razorpay = globally available ho jaata hai
      - EventDetails.jsx mein "new window.Razorpay(options)" call hoga

      NOTE: Yeh CDN script hai — internet hona chahiye load hone ke liye.
      Agar script load nahi hua → EventDetails mein "window.Razorpay" undefined hoga
      → Hum wahan check karte hain aur user ko inform karte hain
    ============================================
    -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
